<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Food Indicator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("{{ url_for('static', filename='background.png') }}");
            background-size: cover; background-position: center; height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card { background: rgba(255,255,255,0.95); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2 class="fw-bold mb-1">🌾 Food Indicator</h2>
        <p class="text-muted mb-4">Create New Account</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}{% for c, m in messages %}<div class="alert alert-{{c}} py-2 small">{{m}}</div>{% endfor %}{% endif %}
        {% endwith %}

        <form action="{{ url_for('register') }}" method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
            
            <select name="role" class="form-select mb-3">
                <option value="user">Field User</option>
                <option value="admin">Administrator</option>
            </select>
            
            <input type="password" name="password" class="form-control mb-4" placeholder="Password" required>
            
            <button class="btn btn-success w-100 py-2 fw-bold">Register Now</button>
            
            <p class="mt-3 small text-muted">Already have an account? 
                <a href="{{ url_for('login') }}" class="text-decoration-none">Sign In</a>
            </p>
        </form>
    </div>
</body>
</html>
