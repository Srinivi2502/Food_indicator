<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Hunger Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #global-map { height: 600px; width: 100%; border-radius: 15px; }
        .hero { background: #1a535c; color: white; padding: 15px; }
    </style>
</head>
<body class="bg-light">
    <div class="hero d-flex justify-content-between align-items-center">
        <h4 class="m-0">🌍 Global Hunger Map Tracker (2026)</h4>
        <a href="/" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
    </div>

    <div class="container mt-4">
        <div class="card shadow-sm p-3">
            <div id="global-map"></div>
        </div>
        <div class="mt-3 alert alert-warning">
            <strong>Note:</strong> Red markers indicate regions with "Serious" or "Critical" food insecurity levels based on current projections.
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('global-map').setView([20, 0], 2); // Global view

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Global Demo Data
        var hungerData = [
            { name: "Central Africa", lat: 6.6, lng: 20.9, level: "Critical" },
            { name: "South Asia (India Region)", lat: 20.5, lng: 78.9, level: "Serious" },
            { name: "Yemen", lat: 15.5, lng: 48.5, level: "Critical" },
            { name: "Haiti", lat: 18.9, lng: -72.2, level: "Serious" }
        ];

        hungerData.forEach(function(loc) {
            L.circle([loc.lat, loc.lng], {
                color: 'red',
                fillColor: '#f03',
                fillOpacity: 0.5,
                radius: 500000
            }).addTo(map).bindPopup(`<b>${loc.name}</b><br>Status: ${loc.level}`);
        });
    </script>
</body>
</html>
